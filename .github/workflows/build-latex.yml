name: Build LaTeX Document

on:
  push:
    branches:
      - main
    # Only run if LaTeX-related files have changed
    paths:
      - '**/*.tex'
      - '**/*.bib'
      - '**/*.cls'
      - '**/*.sty'
      - 'compile.sh'
      - 'assets/**'

jobs:
  build_latex:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Install LaTeX packages
        run: |
          sudo apt-get update
          sudo apt-get install -y latexmk texlive-xetex texlive-luatex texlive-science texlive-bibtex-extra texlive-publishers texlive-fonts-extra texlive-lang-arabic
          
      - name: Compile Document
        # The script creates main.pdf in the root directory
        run: bash ./compile.sh
        
      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v20
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
