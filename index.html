<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Thesis PDF</title>
    <style>
      :root {
        --page-fit: 0.82;
      }
      html,
      body {
        height: 100%;
        margin: 0;
        font-family: system-ui, Arial, Helvetica;
        overflow-x: hidden;
      }
      #viewerContainer {
        display: block;
        padding: 0.5rem;
        max-width: 1000px;
        margin: 0 auto;
      }
      .pageCanvas {
        display: block;
        max-width: 100%;
        height: auto;
        margin: 0.5rem auto;
        border: 1px solid #ddd;
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.06);
        background: #fff;
        touch-action: pan-y;
      }
    </style>
  </head>
  <body>
    <div id="viewerContainer" aria-live="polite"></div>

    <!-- PDF.js from CDN (pin a version in production) -->
    <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.9.179/build/pdf.min.js"></script>
    <script>
      (function () {
        const PDF_URL = "main.pdf";
        pdfjsLib.GlobalWorkerOptions.workerSrc =
          "https://cdn.jsdelivr.net/npm/pdfjs-dist@3.9.179/build/pdf.worker.min.js";

        let pdfDoc = null;
        const container = document.getElementById("viewerContainer");

        async function setupPages() {
          for (let i = 1; i <= pdfDoc.numPages; i++) {
            const wrapper = document.createElement("div");
            wrapper.className = "pageWrapper";
            wrapper.dataset.page = i;
            const canvas = document.createElement("canvas");
            canvas.className = "pageCanvas";
            canvas.setAttribute("role", "img");
            canvas.setAttribute("aria-label", "Page " + i);
            wrapper.appendChild(canvas);
            container.appendChild(wrapper);
          }

          const observer = new IntersectionObserver(
            async (entries) => {
              for (const entry of entries) {
                if (entry.isIntersecting) {
                  const p = parseInt(entry.target.dataset.page, 10);
                  const canvas = entry.target.querySelector("canvas");
                  if (!canvas.dataset.rendered) {
                    await renderPageToCanvas(p, canvas);
                    canvas.dataset.rendered = "1";
                  }
                }
              }
            },
            { root: null, rootMargin: "400px 0px 400px 0px", threshold: 0.1 },
          );

          document
            .querySelectorAll(".pageWrapper")
            .forEach((w) => observer.observe(w));
        }

        async function renderPageToCanvas(pageNum, canvas) {
          const page = await pdfDoc.getPage(pageNum);
          const viewport = page.getViewport({ scale: 1 });

          const containerWidth = Math.min(
            document.documentElement.clientWidth - 24,
            1000,
          );
          const cssWidth = Math.max(
            240,
            Math.floor(
              containerWidth *
                parseFloat(
                  getComputedStyle(document.documentElement).getPropertyValue(
                    "--page-fit",
                  ),
                ),
            ),
          );
          const scale = cssWidth / viewport.width;
          const vp = page.getViewport({ scale });

          const dpr = window.devicePixelRatio || 1;
          canvas.style.width = cssWidth + "px";
          const cssHeight = vp.height * (cssWidth / vp.width);
          canvas.style.height = cssHeight + "px";

          canvas.width = Math.max(1, Math.floor(cssWidth * dpr));
          canvas.height = Math.max(1, Math.floor(cssHeight * dpr));
          const ctx = canvas.getContext("2d");
          ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
          ctx.clearRect(0, 0, canvas.width, canvas.height);

          const renderContext = { canvasContext: ctx, viewport: vp };
          await page.render(renderContext).promise;
        }

        (async function () {
          try {
            pdfDoc = await pdfjsLib.getDocument(PDF_URL).promise;
            await setupPages();
          } catch (err) {
            console.error(err);
          }
        })();

        let resizeTimer = null;
        window.addEventListener("resize", () => {
          clearTimeout(resizeTimer);
          resizeTimer = setTimeout(() => {
            document
              .querySelectorAll('canvas[data-rendered="1"]')
              .forEach((c) => delete c.dataset.rendered);
            window.scrollBy(0, 1);
            window.scrollBy(0, -1);
          }, 200);
        });
      })();
    </script>
  </body>
</html>
