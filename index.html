<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Thesis PDF</title>
    <style>
      :root {
        --toolbar-bg: #f6f6f6;
        --btn-bg: #fff;
        --btn-border: #ddd;
      }
      html,
      body {
        height: 100%;
        margin: 0;
        font-family: system-ui, Arial, Helvetica;
        overflow-x: hidden;
      }
      #toolbar {
        display: flex;
        gap: 0.5rem;
        align-items: center;
        padding: 0.5rem;
        background: var(--toolbar-bg);
        position: sticky;
        top: 0;
        z-index: 10;
      }
      #viewerContainer {
        display: block;
        padding: 0.5rem;
        max-width: 1000px;
        margin: 0 auto;
      }
      .pageCanvas {
        display: block;
        max-width: 100%;
        height: auto;
        margin: 0.5rem auto;
        border: 1px solid #ddd;
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.06);
        background: #fff;
      }
      button {
        background: var(--btn-bg);
        border: 1px solid var(--btn-border);
        padding: 0.4rem 0.6rem;
        border-radius: 6px;
      }
      input[type="range"] {
        width: 120px;
      }
      #page_info {
        min-width: 70px;
        text-align: center;
      }
      .spacer {
        flex: 1;
      }
      @media (max-width: 600px) {
        #toolbar {
          font-size: 0.95rem;
          gap: 0.4rem;
        }
        input[type="range"] {
          width: 90px;
        }
      }
    </style>
  </head>
  <body>
    <div id="toolbar">
      <button id="prev" aria-label="Previous page">◀</button>
      <span id="page_info">—</span>
      <button id="next" aria-label="Next page">▶</button>
      <div class="spacer"></div>
      <label for="zoom">Zoom</label>
      <input id="zoom" type="range" min="50" max="200" value="100" />
    </div>

    <div id="viewerContainer" aria-live="polite"></div>

    <!-- PDF.js from CDN (pin a version in production) -->
    <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.9.179/build/pdf.min.js"></script>
    <script>
      (function () {
        const PDF_URL = "main.pdf";
        pdfjsLib.GlobalWorkerOptions.workerSrc =
          "https://cdn.jsdelivr.net/npm/pdfjs-dist@3.9.179/build/pdf.worker.min.js";

        let pdfDoc = null,
          scalePct = 100;
        const container = document.getElementById("viewerContainer");
        const pageInfo = document.getElementById("page_info");
        const zoomControl = document.getElementById("zoom");

        function updatePageInfo(current) {
          pageInfo.textContent = pdfDoc
            ? current + " / " + pdfDoc.numPages
            : "—";
        }

        async function setupPages() {
          for (let i = 1; i <= pdfDoc.numPages; i++) {
            const wrapper = document.createElement("div");
            wrapper.className = "pageWrapper";
            wrapper.dataset.page = i;
            const canvas = document.createElement("canvas");
            canvas.className = "pageCanvas";
            canvas.setAttribute("role", "img");
            canvas.setAttribute("aria-label", "Page " + i);
            wrapper.appendChild(canvas);
            container.appendChild(wrapper);
          }

          const observer = new IntersectionObserver(
            async (entries) => {
              for (const entry of entries) {
                if (entry.isIntersecting) {
                  const p = parseInt(entry.target.dataset.page, 10);
                  const canvas = entry.target.querySelector("canvas");
                  if (!canvas.dataset.rendered) {
                    await renderPageToCanvas(p, canvas);
                    canvas.dataset.rendered = "1";
                  }
                }
              }
            },
            { root: null, rootMargin: "400px 0px 400px 0px", threshold: 0.1 },
          );

          document
            .querySelectorAll(".pageWrapper")
            .forEach((w) => observer.observe(w));

          const pageObserver = new IntersectionObserver(
            (entries) => {
              let best = null;
              for (const e of entries) {
                if (
                  best === null ||
                  e.intersectionRatio > best.intersectionRatio
                )
                  best = e;
              }
              if (best && best.isIntersecting) {
                updatePageInfo(parseInt(best.target.dataset.page, 10));
              }
            },
            { root: null, threshold: [0.25, 0.5, 0.75] },
          );
          document
            .querySelectorAll(".pageWrapper")
            .forEach((w) => pageObserver.observe(w));
        }

        async function renderPageToCanvas(pageNum, canvas) {
          const page = await pdfDoc.getPage(pageNum);
          const viewport = page.getViewport({ scale: 1 });
          const containerWidth = Math.min(
            document.documentElement.clientWidth - 24,
            1000,
          );
          const baseScale = containerWidth / viewport.width;
          const scale = baseScale * (scalePct / 100);
          const vp = page.getViewport({ scale });

          const dpr = window.devicePixelRatio || 1;
          canvas.style.width = vp.width + "px";
          canvas.style.height = vp.height + "px";
          canvas.width = Math.floor(vp.width * dpr);
          canvas.height = Math.floor(vp.height * dpr);
          const ctx = canvas.getContext("2d");
          ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

          const renderContext = { canvasContext: ctx, viewport: vp };
          await page.render(renderContext).promise;
        }

        (async function () {
          try {
            pdfDoc = await pdfjsLib.getDocument(PDF_URL).promise;
            zoomControl.value = 100;
            updatePageInfo(1);
            await setupPages();
          } catch (err) {
            pageInfo.textContent = "Failed to load PDF";
            console.error(err);
          }
        })();

        zoomControl.addEventListener("input", async (e) => {
          scalePct = parseInt(e.target.value, 10);
          const rendered = document.querySelectorAll(
            'canvas[data-rendered="1"]',
          );
          for (const c of rendered) {
            const p = parseInt(c.closest(".pageWrapper").dataset.page, 10);
            delete c.dataset.rendered;
            await renderPageToCanvas(p, c);
            c.dataset.rendered = "1";
          }
        });

        let resizeTimer = null;
        window.addEventListener("resize", () => {
          clearTimeout(resizeTimer);
          resizeTimer = setTimeout(() => {
            document
              .querySelectorAll('canvas[data-rendered="1"]')
              .forEach((c) => delete c.dataset.rendered);
            window.scrollBy(0, 1);
            window.scrollBy(0, -1);
          }, 200);
        });
      })();
    </script>
  </body>
</html>
